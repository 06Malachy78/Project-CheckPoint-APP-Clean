<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">No cover available</title>
  <desc id="desc">Fallback artwork used when no game cover is available.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)" />
  <rect x="20" y="20" width="600" height="320" rx="20" fill="none" stroke="#27272a" stroke-width="2" />
  <text x="320" y="170" fill="#00ff88" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" text-anchor="middle" letter-spacing="3">
    CHECKPOINT
  </text>
  <text x="320" y="210" fill="#a1a1aa" font-family="Arial, Helvetica, sans-serif" font-size="20" text-anchor="middle" letter-spacing="2">
    NO COVER AVAILABLE
  </text>
</svg>